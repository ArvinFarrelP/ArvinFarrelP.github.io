<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arvin Farrel Pramuditya</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --cyan: #00eaff;
    --red: #ff0033;
    --bg: #030a03;
    --dim: #0a1a0a;
    --glass: rgba(0,255,65,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 998;
  }

  /* Noise texture */
  canvas#noise {
    position: fixed;
    inset: 0;
    opacity: 0.04;
    pointer-events: none;
    z-index: 997;
  }

  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* Grid background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Header decode line */
  .decode-line {
    font-size: 0.65rem;
    color: rgba(0,255,65,0.35);
    letter-spacing: 0.2em;
    margin-bottom: 2.5rem;
    animation: flicker 4s infinite;
  }

  /* Main name */
  .name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    line-height: 1;
    position: relative;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .name .glitch-wrap {
    position: relative;
    display: inline-block;
  }

  .name .glitch-wrap::before,
  .name .glitch-wrap::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
  }

  .name .glitch-wrap::before {
    color: var(--red);
    animation: glitch-1 3.5s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
  }

  .name .glitch-wrap::after {
    color: var(--cyan);
    animation: glitch-2 3.5s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
  }

  /* Subtitle */
  .subtitle {
    font-size: 0.75rem;
    color: var(--cyan);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0.7;
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* Divider */
  .divider {
    width: 100%;
    max-width: 560px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), var(--cyan), var(--green), transparent);
    margin-bottom: 3rem;
    position: relative;
    animation: flicker 5s infinite;
  }

  .divider::after {
    content: '◈';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg);
    padding: 0 0.5rem;
    font-size: 0.85rem;
    color: var(--cyan);
  }

  /* Links section */
  .links {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 560px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.4rem;
    border: 1px solid rgba(0,255,65,0.15);
    background: var(--glass);
    text-decoration: none;
    color: var(--green);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  .link-item::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,65,0.07), transparent);
    transition: left 0.4s;
  }

  .link-item:hover::before {
    left: 100%;
  }

  .link-item:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,234,255,0.1), inset 0 0 20px rgba(0,234,255,0.03);
    animation: h-glitch 0.3s steps(2) 1;
  }

  .link-item:hover .link-icon { color: var(--cyan); }

  .link-icon {
    font-size: 1.1rem;
    width: 1.5rem;
    text-align: center;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .link-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.5;
    display: block;
  }

  .link-url {
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    display: block;
    word-break: break-all;
  }

  .link-tag {
    margin-left: auto;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    opacity: 0.35;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Status bar */
  .status-bar {
    margin-top: 3rem;
    width: 100%;
    max-width: 560px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.6rem;
    color: rgba(0,255,65,0.3);
    letter-spacing: 0.2em;
    border-top: 1px solid rgba(0,255,65,0.08);
    padding-top: 1rem;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 0.4rem;
    animation: blink 1.2s step-end infinite;
  }

  /* Glitch scan line that moves */
  .scan-line {
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: rgba(0,255,65,0.12);
    animation: scan 8s linear infinite;
    z-index: 996;
    pointer-events: none;
  }

  /* Keyframes */
  @keyframes glitch-1 {
    0%,95%,100% { transform: none; opacity: 0; }
    96% { transform: translate(-3px, 1px) skewX(-2deg); opacity: 0.8; }
    97% { transform: translate(3px, -1px) skewX(2deg); opacity: 0.6; }
    98% { transform: translate(-2px, 2px); opacity: 0.8; }
    99% { transform: none; opacity: 0; }
  }

  @keyframes glitch-2 {
    0%,92%,100% { transform: none; opacity: 0; }
    93% { transform: translate(4px, -2px) skewX(3deg); opacity: 0.7; }
    94% { transform: translate(-3px, 1px); opacity: 0.5; }
    95% { transform: none; opacity: 0; }
  }

  @keyframes h-glitch {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px) skewX(-1deg); }
    50% { transform: translateX(4px) skewX(1deg); }
    75% { transform: translateX(-2px); }
    100% { transform: translateX(0); }
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.4; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  @keyframes pulse {
    0%,100% { opacity: 0.7; }
    50% { opacity: 0.4; }
  }

  @keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes scan {
    0% { top: -2px; }
    100% { top: 100vh; }
  }

  @keyframes noise-shift {
    0%,100% { transform: translate(0,0); }
    10% { transform: translate(-1%,-1%); }
    30% { transform: translate(1%,0); }
    50% { transform: translate(-0.5%,1%); }
    70% { transform: translate(0.5%,-0.5%); }
    90% { transform: translate(-1%,0.5%); }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scan-line"></div>
<canvas id="noise"></canvas>

<div class="container">
  <div class="decode-line">[ IDENTITY_RESOLVED :: SYS_AUTH_OK :: NODE_ACTIVE ]</div>

  <h1 class="name">
    <span class="glitch-wrap" data-text="Arvin Farrel">Arvin Farrel</span>
    <br>
    <span class="glitch-wrap" data-text="Pramuditya" style="font-size:0.6em; opacity:0.7;">Pramuditya</span>
  </h1>

  <p class="subtitle">Personal Page &nbsp;·&nbsp; Cryptanalyst Interface</p>

  <div class="divider"></div>

  <div class="links">

    <a class="link-item" href="https://arvinfarrelp.github.io/.well-known/keyoxide.txt" target="_blank" rel="noopener">
      <span class="link-icon">⚷</span>
      <span>
        <span class="link-label">Cryptographic Identity</span>
        <span class="link-url">keyoxide.txt</span>
      </span>
      <span class="link-tag">[PGP]</span>
    </a>

    <a class="link-item" href="https://arvinfarrelp.github.io/.well-known/security.txt" target="_blank" rel="noopener">
      <span class="link-icon">🛡</span>
      <span>
        <span class="link-label">Security Disclosure</span>
        <span class="link-url">security.txt</span>
      </span>
      <span class="link-tag">[SEC]</span>
    </a>

  </div>

  <div class="status-bar">
    <span><span class="status-dot"></span>ONLINE</span>
    <span id="clock">--:--:--</span>
    <span>ENC_CHANNEL_SECURE</span>
  </div>
</div>

<script>
  // Live clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().slice(0,8);
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Canvas noise
  const canvas = document.getElementById('noise');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawNoise() {
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255;
      data[i] = 0;
      data[i+1] = v * 0.9; // greenish
      data[i+2] = v * 0.3;
      data[i+3] = v * 0.15;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  setInterval(drawNoise, 80);

  // Random glitch flash on body
  function randomGlitch() {
    const el = document.querySelector('.name');
    el.style.transform = `translateX(${(Math.random()-0.5)*6}px) skewX(${(Math.random()-0.5)*3}deg)`;
    setTimeout(() => { el.style.transform = ''; }, 60);
    setTimeout(randomGlitch, 2500 + Math.random() * 5000);
  }
  randomGlitch();
</script>
</body>
</html>
